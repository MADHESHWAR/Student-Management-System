<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - EduTech</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="flex-center">
        <div class="card" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <h2 style="color: var(--secondary-color);">Student Portal</h2>
                <p>Sign in with your Roll Number</p>
            </div>

            <div id="login-alert"></div>

            <form id="student-login-form">
                <div class="form-group">
                    <label for="roll_number">Roll Number</label>
                    <input type="text" id="roll_number" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn"
                    style="background-color: var(--secondary-color); color: white; width: 100%; margin-top: 1rem;">Sign
                    In</button>
            </form>
            <div class="text-center mt-4">
                <a href="index.html" style="font-size: 0.875rem;">&larr; Back to Role Selection</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('student-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const roll_number = document.getElementById('roll_number').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');

            try {
                btn.textContent = 'Signing in...';
                btn.disabled = true;

                const response = await fetch(API_URL + '/student/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roll_number, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', 'student');
                    localStorage.setItem('userData', JSON.stringify(data.student));
                    window.location.href = 'student-dashboard.html';
                } else {
                    showAlert('login-alert', data.message || 'Login failed', 'error');
                }
            } catch (err) {
                showAlert('login-alert', 'Network error. Please try again.', 'error');
            } finally {
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
