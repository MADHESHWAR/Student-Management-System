<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - EduTech Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .actions-btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
            border-radius: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">EduTech Admin</div>
            <nav class="d-flex flex-column gap-2" style="flex: 1;">
                <a href="admin-dashboard.html" class="nav-link">📊 Dashboard</a>
                <a href="students.html" class="nav-link active">👥 Students</a>
                <a href="courses.html" class="nav-link">📚 Courses</a>
            </nav>
            <div class="mt-4">
                <button id="logout-btn" class="btn btn-outline" style="width: 100%;">🚪 Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2>Manage Students</h2>
                <button class="btn btn-primary" onclick="openModal('add')">+ Add Student</button>
            </header>

            <div id="alert-container"></div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Roll Number</th>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Year</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body">
                            <tr>
                                <td colspan="6" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="student-modal" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title" class="mb-4">Add Student</h3>
            <form id="student-form">
                <input type="hidden" id="student_id">

                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group mb-1">
                        <label>Roll Number (Login ID)</label>
                        <input type="text" id="roll_number" required>
                    </div>
                    <div class="form-group mb-1" id="password-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                </div>

                <div class="form-group mb-1">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group mb-1">
                        <label>Department</label>
                        <select id="department" required>
                            <option value="">Select...</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Artificial Intelligence">Artificial Intelligence</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                        </select>
                    </div>
                    <div class="form-group mb-1">
                        <label>Year</label>
                        <select id="year" required>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                </div>

                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group mb-4">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-group mb-4">
                        <label>Phone</label>
                        <input type="text" id="phone">
                    </div>
                </div>

                <div class="d-flex justify-between">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        checkAuth('admin');
        let studentsList = [];

        async function loadStudents() {
            try {
                const students = await fetchWithAuth('/admin/students');
                studentsList = students;
                const tbody = document.getElementById('students-table-body');

                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No students found.</td></tr>';
                    return;
                }

                tbody.innerHTML = students.map(st => `
                    <tr>
                        <td style="font-weight: 500;">${st.roll_number}</td>
                        <td>${st.name}</td>
                        <td>${st.department || '-'}</td>
                        <td>${st.year ? st.year + ' Year' : '-'}</td>
                        <td style="color: var(--text-muted);">${st.email || '-'}</td>
                        <td class="gap-2 d-flex">
                            <button class="btn btn-primary actions-btn" onclick="openModal('edit', ${st.id})">Edit</button>
                            <button class="btn btn-danger actions-btn" onclick="deleteStudent(${st.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                if (err.message === 'Unauthorized') return;
                showAlert('alert-container', err.message, 'error');
            }
        }

        function openModal(mode, id = null) {
            document.getElementById('student-modal').classList.add('active');
            const form = document.getElementById('student-form');
            form.reset();

            if (mode === 'add') {
                document.getElementById('modal-title').textContent = 'Add New Student';
                document.getElementById('student_id').value = '';
                document.getElementById('roll_number').disabled = false;
                document.getElementById('password-group').style.display = 'block';
                document.getElementById('password').required = true;
            } else {
                const student = studentsList.find(s => s.id === id);
                if (!student) return;

                document.getElementById('modal-title').textContent = 'Edit Student';
                document.getElementById('student_id').value = student.id;
                document.getElementById('roll_number').value = student.roll_number;
                document.getElementById('roll_number').disabled = true;
                document.getElementById('password-group').style.display = 'none';
                document.getElementById('password').required = false;

                document.getElementById('name').value = student.name;
                document.getElementById('department').value = student.department || '';
                document.getElementById('year').value = student.year || '';
                document.getElementById('email').value = student.email || '';
                document.getElementById('phone').value = student.phone || '';
            }
        }

        function closeModal() {
            document.getElementById('student-modal').classList.remove('active');
        }

        document.getElementById('student-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('student_id').value;
            const btn = document.getElementById('save-btn');

            const payload = {
                name: document.getElementById('name').value,
                department: document.getElementById('department').value,
                year: parseInt(document.getElementById('year').value),
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
            };

            const isAdd = !id;
            if (isAdd) {
                payload.roll_number = document.getElementById('roll_number').value;
                payload.password = document.getElementById('password').value;
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Saving...';

                const response = await fetchWithAuth(`/admin/students${isAdd ? '' : '/' + id}`, {
                    method: isAdd ? 'POST' : 'PUT',
                    body: JSON.stringify(payload)
                });

                showAlert('alert-container', response.message, 'success');
                closeModal();
                loadStudents();
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Student';
            }
        });

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;
            try {
                const res = await fetchWithAuth(`/admin/students/${id}`, { method: 'DELETE' });
                showAlert('alert-container', res.message, 'success');
                loadStudents();
            } catch (err) {
                showAlert('alert-container', err.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadStudents);
    </script>
</body>

</html>
