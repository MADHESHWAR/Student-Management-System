<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses - EduTech Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .actions-btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
            border-radius: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">EduTech Admin</div>
            <nav class="d-flex flex-column gap-2" style="flex: 1;">
                <a href="admin-dashboard.html" class="nav-link">📊 Dashboard</a>
                <a href="students.html" class="nav-link">👥 Students</a>
                <a href="courses.html" class="nav-link active">📚 Courses</a>
            </nav>
            <div class="mt-4">
                <button id="logout-btn" class="btn btn-outline" style="width: 100%;">🚪 Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2>Manage Courses</h2>
                <button class="btn btn-primary" onclick="openModal('add')">+ Add Course</button>
            </header>

            <div id="alert-container"></div>

            <div class="card bg-card mb-4" style="color: var(--text-muted); font-size: 0.9rem;">
                <p>Note: You can assign marks to students for these courses from here by viewing a Course's students.
                    (Simplified layout below)</p>
            </div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Course Code</th>
                                <th>Course Name</th>
                                <th>Department</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="courses-table-body">
                            <tr>
                                <td colspan="4" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Course Modal -->
    <div id="course-modal" class="modal-overlay">
        <div class="modal">
            <h3 class="mb-4">Add Course</h3>
            <form id="course-form">
                <div class="form-group mb-1">
                    <label>Course Code (e.g. CS101)</label>
                    <input type="text" id="course_code" required>
                </div>

                <div class="form-group mb-1">
                    <label>Course Name</label>
                    <input type="text" id="course_name" required>
                </div>

                <div class="form-group mb-4">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="">Select...</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                    </select>
                </div>

                <div class="d-flex justify-between">
                    <button type="button" class="btn btn-outline" onclick="closeModal('course-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Save Course</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assign Marks Modal -->
    <div id="marks-modal" class="modal-overlay">
        <div class="modal">
            <h3 class="mb-4">Assign Marks - <span id="marks-course-name"></span></h3>
            <form id="marks-form">
                <input type="hidden" id="mark_course_id">
                <div class="form-group mb-1">
                    <label>Student Roll Number</label>
                    <select id="marks_student" required>
                        <option value="">Loading students...</option>
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label>Marks</label>
                    <input type="number" id="marks_value" min="0" max="100" required>
                </div>
                <div class="d-flex justify-between">
                    <button type="button" class="btn btn-outline" onclick="closeModal('marks-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-marks-btn">Save Marks</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        checkAuth('admin');

        async function loadCourses() {
            try {
                const courses = await fetchWithAuth('/admin/courses');
                const tbody = document.getElementById('courses-table-body');

                if (courses.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">No courses found.</td></tr>';
                    return;
                }

                tbody.innerHTML = courses.map(c => `
                    <tr>
                        <td style="font-weight: 500; color: var(--secondary-color);">${c.course_code}</td>
                        <td>${c.course_name}</td>
                        <td>${c.department}</td>
                        <td>
                            <button class="btn btn-outline actions-btn" onclick="openMarksModal(${c.id}, '${c.course_code} - ${c.course_name}')">Assign Marks</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                if (err.message === 'Unauthorized') return;
                showAlert('alert-container', err.message, 'error');
            }
        }

        function openModal() {
            document.getElementById('course-modal').classList.add('active');
            document.getElementById('course-form').reset();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        document.getElementById('course-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');

            const payload = {
                course_code: document.getElementById('course_code').value,
                course_name: document.getElementById('course_name').value,
                department: document.getElementById('department').value,
            };

            try {
                btn.disabled = true;
                btn.textContent = 'Saving...';
                const response = await fetchWithAuth('/admin/courses', {
                    method: 'POST', body: JSON.stringify(payload)
                });
                showAlert('alert-container', response.message, 'success');
                closeModal('course-modal');
                loadCourses();
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Course';
            }
        });

        async function openMarksModal(courseId, courseName) {
            document.getElementById('marks-modal').classList.add('active');
            document.getElementById('marks-course-name').textContent = courseName;
            document.getElementById('mark_course_id').value = courseId;
            document.getElementById('marks-form').reset();

            const dropdown = document.getElementById('marks_student');
            dropdown.innerHTML = '<option value="">Loading...</option>';

            try {
                const students = await fetchWithAuth('/admin/students');
                dropdown.innerHTML = '<option value="">Select a student...</option>' +
                    students.map(s => `<option value="${s.id}">${s.roll_number} - ${s.name}</option>`).join('');
            } catch (err) {
                dropdown.innerHTML = '<option value="">Failed to load students</option>';
            }
        }

        document.getElementById('marks-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                course_id: document.getElementById('mark_course_id').value,
                student_id: document.getElementById('marks_student').value,
                marks: parseInt(document.getElementById('marks_value').value)
            };

            try {
                document.getElementById('save-marks-btn').disabled = true;
                const response = await fetchWithAuth('/admin/marks', {
                    method: 'POST', body: JSON.stringify(payload)
                });
                alert('Marks Assigned successfully!');
                closeModal('marks-modal');
            } catch (err) {
                alert(err.message);
            } finally {
                document.getElementById('save-marks-btn').disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
</body>

</html>
